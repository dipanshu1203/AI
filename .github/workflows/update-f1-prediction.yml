name: Update F1 Prediction Data

on:
  schedule:
    - cron: "30 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Refresh prediction data
        run: node scripts/update-f1-prediction.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects/F1/data/prediction.json
          git diff --cached --quiet || git commit -m "Update F1 prediction data"
          git push
